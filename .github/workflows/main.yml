name: Proxy Checker Bot
on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch: # Ручной запуск

jobs:
  check-proxies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests json5 pyyaml psutil
          fi

      - name: Install Xray and Librespeed
        run: |
          # Установка Xray через официальный скрипт (в /usr/local/bin/xray)
          sudo bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
          
          # Установка Librespeed CLI
          curl -L https://github.com/librespeed/speedtest-cli/releases/download/v1.0.10/librespeed-cli_1.0.10_linux_amd64.tar.gz | tar xz
          mv librespeed-cli librespeed-cli-bin
          chmod +x librespeed-cli-bin

      - name: Run Proxy Checker
        run: python main.py
        env:
          # Указываем точные пути, которые Python скрипт будет использовать
          XRAY_PATH: /usr/local/bin/xray
          LIBRESPEED_PATH: ./librespeed-cli-bin

      - name: Commit and Push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Update working proxies: $(date)" || echo "No changes to commit"
          git push
