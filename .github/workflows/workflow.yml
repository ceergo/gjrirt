name: Proxy Checker Bot
on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch: # Ручной запуск
jobs:
  check-proxies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests json5 pyyaml psutil
          fi
      - name: Install Xray and Librespeed
        run: |
          # Установка Xray через официальный скрипт
          # Скрипт установит его в /usr/local/bin/xray
          sudo bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
          
          # Установка Librespeed CLI
          # Скачиваем, распаковываем и перемещаем в корень проекта для надежности
          curl -L https://github.com/librespeed/speedtest-cli/releases/download/v1.0.10/librespeed-cli_1.0.10_linux_amd64.tar.gz | tar xz
          chmod +x librespeed-cli
          # Проверяем наличие файлов для логов
          ls -l /usr/local/bin/xray || echo "Xray not found in /usr/local/bin"
          ls -l ./librespeed-cli || echo "Librespeed not found in current dir"
      - name: Run Proxy Checker
        run: python main.py
        env:
          # Указываем точные пути, которые мы создали шагом выше
          XRAY_PATH: /usr/local/bin/xray
          LIBRESPEED_PATH: ./librespeed-cli
      - name: Commit and Push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Update working proxies: $(date)" || echo "No changes to commit"
          git push
