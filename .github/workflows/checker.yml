name: Proxy Subscription Checker

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'First bot trigger'
        default: 'api'

jobs:
  check-proxies:
    runs-on: ubuntu-latest
    timeout-minutes: 60  
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Xray and Librespeed
        run: |
          chmod +x setup.sh
          ./setup.sh

      - name: Run Proxy Checker
        run: |
          # Файлы теперь в корне
          python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add raw.txt working.txt fast.txt checker.log .run_count 2>/dev/null || true
          git commit -m "chore: update working proxies [skip ci]" || echo "No changes to commit"
          git push
